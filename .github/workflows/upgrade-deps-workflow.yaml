---
name: Upgrade Dependencies
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.OAPICF_GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: '26'
      - run: npm install -g bob@5.3.0
      - run: bob updep
      - uses: cliffano/command-docker-action@v1.4.0
        with:
          image: cliffano/studio:3.2.0
          command: 'make deps ci'
      - uses: cliffano/save-changes-action@v1.0.0
        with:
          message: "Upgrade dependencies to latest"
          github_token: ${{ secrets.OAPICF_GITHUB_TOKEN }}
